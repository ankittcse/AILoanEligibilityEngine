services:
  backend:
    build: .
    container_name: backend
    command: node server.js
    ports:
      - "5000:5000"
    environment:
      - VITE_GEMINI_API_KEY=AIzaSyDn9eQea9xu6ZQMPVTjAEQilZtS7AO0zNs

  frontend:
    build: .
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0 --port 4173
    ports:
      - "4173:4173"
    depends_on:
      - backend